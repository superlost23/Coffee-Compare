<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>{% block title %}Coffee Compare{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap">
<link rel="stylesheet" href="/static/css/main.css?v=2">
<script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
<header class="topbar">
  <a href="/" class="brand">
    <span class="brand-mark">●</span>
    <span class="brand-text">Coffee&nbsp;Compare</span>
  </a>
  <nav class="topbar-nav">
    <a href="/privacy">Privacy</a>
  </nav>
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer class="footer">
  <p>An anonymous tool for finding the same coffee at other roasters. No accounts, no cookies, no tracking.</p>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
